openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dorshi Holiday Resort Booking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rooms
    description: Room availability
  - name: bookings
    description: Booking operations
  - name: cancellations
    description: Cancellation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /rooms:
    get:
      operationId: getAvailableRooms
      tags: [rooms]
      summary: Get available rooms for date range
      parameters:
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
        - name: checkOut
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of available rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "200":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Room not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cancellations:
    post:
      operationId: processCancellation
      tags: [cancellations]
      summary: Lookup or cancel a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancellationRequest"
      responses:
        "200":
          description: Cancellation response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
      required:
        - status

    Room:
      type: object
      required: [id, name, type, capacity, pricePerNight]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        capacity:
          type: integer
        pricePerNight:
          type: integer
        description:
          type: ["string", "null"]
        images:
          type: ["array", "null"]
          items:
            type: string

    BookingInput:
      type: object
      required: [guestName, phone, roomId, checkIn, checkOut, guests]
      properties:
        guestName:
          type: string
        phone:
          type: string
        roomId:
          type: string
        checkIn:
          type: string
        checkOut:
          type: string
        guests:
          type: integer

    BookingRecord:
      type: object
      required: [id, guestName, phone, roomId, checkIn, checkOut, guests, status]
      properties:
        id:
          type: string
        guestName:
          type: string
        phone:
          type: string
        roomId:
          type: string
        checkIn:
          type: string
        checkOut:
          type: string
        guests:
          type: integer
        status:
          type: string
        createdAt:
          type: ["string", "null"]

    BookingResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        booking:
          $ref: "#/components/schemas/BookingRecord"
        error:
          type: ["string", "null"]
        retry:
          type: ["boolean", "null"]

    CancellationRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
        guestName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        bookingId:
          type: ["string", "null"]

    CancellationResponse:
      type: object
      required: [found]
      properties:
        found:
          type: boolean
        booking:
          $ref: "#/components/schemas/BookingRecord"
        success:
          type: ["boolean", "null"]
        message:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        bookingId:
          type: ["string", "null"]
        checkIn:
          type: ["string", "null"]
        checkOut:
          type: ["string", "null"]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
